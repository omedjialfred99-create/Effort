<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Effort</title>
</head>
<body>
    <nav>
        <div class="logo">
            <h1>Effort</h1>
        </div>

        <div class="humburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <ul>
                <li><a href="#Accueil" class="nav-items active">Accueil</a></li>
                <li><a href="#À-propos" class="nav-items">À propos</a></li>
                <li><a href="#Services" class="nav-items">Services</a></li>
                <li><a href="#Contact" class="nav-items">Contact</a></li>
                <li><button href="prendre-rdv" class="nav-items">Prendre rendez-vous</button></li>
            </ul>
        </div>
    </nav>
    
    <form>

        <div class="text-container">
            <h1>Bienvenue chez Effort</h1>
            <p>Parce que chaque minute compte, notre service d'urgences et nos <br>
            équipes de proximité sont mobilisés en permanence pour vous garantire une prise en charge immediate et sécurisée.</p>
        </div>

    </form>
    <script>
        const navItems = document.querySelectorAll('.nav-items');
        const hamburger = document.querySelector('.humburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(link => link.classList.remove('active'));
                item.classList.add('active');
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
